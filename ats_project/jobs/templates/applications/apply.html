<!DOCTYPE html>
<html>
<head>
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <h2>
        Apply for {{ job.title }}
    </h2>

    <p>
        {{ job.location }}
    </p>

    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-success">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <form
        method="POST"
        enctype="multipart/form-data">

        {% csrf_token %}

        <div class="mb-3">
            <label>Name</label>
            <input
                type="text"
                name="name"
                class="form-control"
                required>
        </div>

        <div class="mb-3">
            <label>Email</label>
            <input
                type="email"
                name="email"
                class="form-control"
                required>
        </div>

        <div class="mb-3">
            <label>Phone</label>
            <input
                type="text"
                name="phone"
                class="form-control"
                required>
        </div>
        

        <div class="mb-3">
            <label>Resume</label>
            <input
                type="file"
                name="resume"
                class="form-control"
                required>
        </div>

        <div class="mb-3">
            <label>Cover Letter</label>
            <textarea
                name="cover_letter"
                class="form-control">
            </textarea>
        </div>

        <button
            class="btn btn-success">
            Apply Now
        </button>

    </form>

</div>

</body>
</html>

<!DOCTYPE html>
<html>
<head>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<h2>Applications</h2>

<table
class="table table-bordered">

<thead>

<tr>

<th>ID</th>

<th>Name</th>

<th>Email</th>

<th>Phone</th>

<th>Job</th>

<th>Resume</th>

<th>Date</th>

</tr>

</thead>

<tbody>

{% for app in applications %}

<tr>

<td>{{ app.id }}</td>

<td>{{ app.name }}</td>

<td>{{ app.email }}</td>

<td>{{ app.phone }}</td>

<td>{{ app.job.title }}</td>

<td>

<a
href="{{ app.resume.url }}"
target="_blank">

View Resume

</a>

</td>

<td>
{{ app.created_at }}
</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

</body>

</html>

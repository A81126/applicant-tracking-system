<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Job</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-9">

            <div class="card shadow border-0">

                <div class="card-header bg-warning">

                    <h3 class="mb-0">
                        Edit Job
                    </h3>

                </div>

                <div class="card-body">

                    <form method="POST">

                        {% csrf_token %}

                        <div class="row">

                            <div class="col-md-6 mb-3">

                                <label class="form-label">
                                    Job Title
                                </label>

                                <input
                                    type="text"
                                    name="title"
                                    value="{{ job.title }}"
                                    class="form-control"
                                    required>

                            </div>

                            <div class="col-md-6 mb-3">

                                <label class="form-label">
                                    Slug
                                </label>

                                <input
                                    type="text"
                                    name="slug"
                                    value="{{ job.slug }}"
                                    class="form-control"
                                    required>

                            </div>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Description
                            </label>

                            <textarea
                                name="description"
                                rows="5"
                                class="form-control"
                                required>{{ job.description }}</textarea>

                        </div>

                        <div class="row">

                            <div class="col-md-6 mb-3">

                                <label class="form-label">
                                    Salary Start
                                </label>

                                <input
                                    type="number"
                                    name="pay_start"
                                    value="{{ job.pay_start }}"
                                    class="form-control">

                            </div>

                            <div class="col-md-6 mb-3">

                                <label class="form-label">
                                    Salary End
                                </label>

                                <input
                                    type="number"
                                    name="pay_end"
                                    value="{{ job.pay_end }}"
                                    class="form-control">

                            </div>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Location
                            </label>

                            <input
                                type="text"
                                name="location"
                                value="{{ job.location }}"
                                class="form-control">

                        </div>
                        <div class="row">

    <div class="col-md-6 mb-3">

        <label class="form-label">
            Job Type
        </label>

        <select
            name="job_type"
            class="form-select">

            <option value="full_time"
                {% if job.job_type == "full_time" %}selected{% endif %}>
                Full Time
            </option>

            <option value="part_time"
                {% if job.job_type == "part_time" %}selected{% endif %}>
                Part Time
            </option>

            <option value="contract"
                {% if job.job_type == "contract" %}selected{% endif %}>
                Contract
            </option>

            <option value="internship"
                {% if job.job_type == "internship" %}selected{% endif %}>
                Internship
            </option>

        </select>

    </div>

    <div class="col-md-6 mb-3">

        <label class="form-label">
            Location Type
        </label>

        <select
            name="location_type"
            class="form-select">

            <option value="remote"
                {% if job.location_type == "remote" %}selected{% endif %}>
                Remote
            </option>

            <option value="onsite"
                {% if job.location_type == "onsite" %}selected{% endif %}>
                On-Site
            </option>

            <option value="hybrid"
                {% if job.location_type == "hybrid" %}selected{% endif %}>
                Hybrid
            </option>

        </select>

    </div>

</div>

                        <div class="mb-3">

                            <label class="form-label">
                                Status
                            </label>

                            <select
                                name="status"
                                class="form-select">

                                <option value="draft" {% if job.status == "draft" %}selected{% endif %}>Draft</option>
                                <option value="pending" {% if job.status == "pending" %}selected{% endif %}>Pending</option>
                                <option value="live" {% if job.status == "live" %}selected{% endif %}>Live</option>
                                <option value="closed" {% if job.status == "closed" %}selected{% endif %}>Closed</option>

                            </select>

                        </div>

                        <button
                            type="submit"
                            class="btn btn-success">

                            Update Job

                        </button>

                        <a href="{% url 'dashboard-jobs' %}"
                           class="btn btn-secondary">

                            Back

                        </a>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
